<!DOCTYPE html>
<html>
<head>
    <title>Network Monitor</title>
</head>
<body>
    <h2>Network Fault Predictor</h2>

    <input id="latency" placeholder="Latency"><br>
    <input id="packet_loss" placeholder="Packet Loss"><br>
    <input id="cpu" placeholder="CPU Usage"><br>
    <input id="memory" placeholder="Memory Usage"><br>

    <button onclick="predict()">Predict</button>

    <p id="result"></p>

    <script>
        async function predict() {
            const res = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    latency: parseFloat(latency.value),
                    packet_loss: parseFloat(packet_loss.value),
                    cpu_usage: parseFloat(cpu.value),
                    memory_usage: parseFloat(memory.value)
                })
            });

            const data = await res.json();
            document.getElementById("result").innerText =
                "Failure: " + data.failure_prediction +
                " (Probability: " + data.failure_probability + ")";
        }
    </script>
</body>
</html>
